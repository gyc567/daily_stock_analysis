name: Type-Safety-Contract-Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-ci.txt

      - name: Pyright type check
        run: pyright src data_provider api bot

      - name: Mypy type audit
        run: mypy src data_provider api bot

      - name: Contract smoke test
        env:
          ICONTRACT_SLOW: "true"
        run: |
          python -m pytest tests/test_realtime_types_contract.py tests/test_risk_check_contract.py tests/test_data_fetcher_caching.py -v --tb=short
